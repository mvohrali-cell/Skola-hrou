<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architekti dějin | Škola hrou</title>
    
    <!-- Knihovny pro běh přímo v prohlížeči -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; margin: 0; padding: 0; overflow-x: hidden; }
        .text-gradient { background: linear-gradient(to right, #ef4444, #b91c1c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; padding-right: 0.2em; }
        .reveal { animation: reveal 0.8s ease-out forwards; opacity: 0; }
        @keyframes reveal { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .btn-pulse { animation: btn-pulse 2s infinite; }
        @keyframes btn-pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 selection:bg-red-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const getIcon = (iconName) => {
                switch(iconName) {
                    case 'brain': return <path d="M9.5 2a2.5 2.5 0 0 1 2.5 2.5V10H15a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2h-1.5a1 1 0 0 0-1 1v1.5a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-1.5a1 1 0 0 0-1-1H5a2 2 0 0 1-2-2v-2a2 2 0 0 1 2-2h2.5V4.5A2.5 2.5 0 0 1 9.5 2z" />;
                    case 'users-2': return <React.Fragment><path d="M14 19a6 6 0 0 0-12 0" /><circle cx="8" cy="9" r="4" /><path d="M22 19a6 6 0 0 0-6-6 4 4 0 1 0 0-8" /></React.Fragment>;
                    case 'trending-up': return <React.Fragment><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><path d="M17 6h6v6" /></React.Fragment>;
                    case 'brick-wall': return <React.Fragment><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M12 9h9" /><path d="M3 15h9" /><path d="M9 9v12" /><path d="M15 3v6" /><path d="M15 15v6" /><path d="M3 9h9" /><path d="M12 15h9" /></React.Fragment>;
                    case 'arrow-right': return <React.Fragment><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></React.Fragment>;
                    case 'package': return <React.Fragment><path d="M16.5 9.4 7.5 4.21" /><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.29 7 12 12 20.71 7" /><line x1="12" y1="22" x2="12" y2="12" /></React.Fragment>;
                    case 'archive': return <React.Fragment><rect width="20" height="5" x="2" y="3" rx="1" /><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8" /><path d="M10 12h4" /></React.Fragment>;
                    case 'cpu': return <React.Fragment><rect width="16" height="16" x="4" y="4" rx="2" /><rect width="6" height="6" x="9" y="9" rx="1" /><path d="M15 2v2" /><path d="M15 20v2" /><path d="M2 15h2" /><path d="M2 9h2" /><path d="M20 15h2" /><path d="M20 9h2" /><path d="M9 2v2" /><path d="M9 20v2" /></React.Fragment>;
                    case 'shield-check': return <React.Fragment><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" /><path d="m9 12 2 2 4-4" /></React.Fragment>;
                    case 'clock': return <React.Fragment><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></React.Fragment>;
                    case 'alert-triangle': return <React.Fragment><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></React.Fragment>;
                    case 'award': return <React.Fragment><circle cx="12" cy="8" r="6" /><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11" /></React.Fragment>;
                    case 'external-link': return <React.Fragment><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></React.Fragment>;
                    case 'layout': return <React.Fragment><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M3 9h18" /><path d="M9 21V9" /></React.Fragment>;
                    case 'arrow-left': return <React.Fragment><path d="m12 19-7-7 7-7" /><path d="M19 12H5" /></React.Fragment>;
                    case 'history': return <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />;
                    case 'tent': return <path d="M19 20 12 4 5 20h14Z" />;
                    case 'layers': return <React.Fragment><path d="M12 2 2 7l10 5 10-5-10-5Z" /><path d="m2 17 10 5 10-5" /><path d="m2 12 10 5 10-5" /></React.Fragment>;
                    case 'landmark': return <React.Fragment><line x1="3" y1="22" x2="21" y2="22" /><line x1="6" y1="18" x2="6" y2="11" /><line x1="10" y1="18" x2="10" y2="11" /><line x1="14" y1="18" x2="14" y2="11" /><line x1="18" y1="18" x2="18" y2="11" /><polygon points="12 2 20 7 4 7 12 2" /></React.Fragment>;
                    case 'tower-control': return <React.Fragment><path d="M18.2 12.27 20 6H4l1.8 6.27a1 1 0 0 0 .95.73h10.5a1 1 0 0 0 .95-.73Z" /><path d="M8 13v9" /><path d="M16 13v9" /><path d="M7 22h10" /></React.Fragment>;
                    case 'layout-grid': return <React.Fragment><rect width="7" height="7" x="3" y="3" rx="1" /><rect width="7" height="7" x="14" y="3" rx="1" /><rect width="7" height="7" x="14" y="14" rx="1" /><rect width="7" height="7" x="3" y="14" rx="1" /></React.Fragment>;
                    case 'zap': return <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />;
                    case 'home': return <React.Fragment><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></React.Fragment>;
                    case 'map': return <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21" />;
                    case 'phone': return <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />;
                    case 'file-text': return <React.Fragment><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" /><path d="M14 2v4a2 2 0 0 0 2 2h4" /><path d="M10 9H8" /><path d="M16 13H8" /><path d="M16 17H8" /></React.Fragment>;
                    case 'book-open': return <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />;
                    default: return <circle cx="12" cy="12" r="10" />;
                }
            };

            return (
                <span className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}>
                    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        {getIcon(name)}
                    </svg>
                </span>
            );
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [grade, setGrade] = useState(4);
            const [currentImg, setCurrentImg] = useState(0);
            const googleFormUrl = "https://forms.gle/RhHPDeaRrZQ1vspMA";
            const heroImages = ["image_8920a3.jpg", "foto2.jpg", "foto3.jpg"];

            useEffect(() => { window.scrollTo(0, 0); }, [view]);
            useEffect(() => {
                const timer = setInterval(() => setCurrentImg(prev => (prev + 1) % heroImages.length), 5000);
                return () => clearInterval(timer);
            }, [heroImages.length]);

            const getSlug = (text) => text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, "");

            const lessons4 = [
                { id: "4-01", name: "Stroj času", icon: "history", month: "Září" },
                { id: "4-02", name: "Lovci mamutů", icon: "tent", month: "Říjen" },
                { id: "4-03", name: "Keltské oppidum", icon: "shield", month: "Listopad" },
                { id: "4-04", name: "Příchod Slovanů", icon: "layers", month: "Prosinec" },
                { id: "4-05", name: "Velká Morava", icon: "landmark", month: "Leden" },
                { id: "4-06", name: "Raní Přemyslovci", icon: "tower-control", month: "Únor" },
                { id: "4-07", name: "Středověké město", icon: "layout-grid", month: "Březen" },
                { id: "4-08", name: "Gotika a Karel IV.", icon: "zap", month: "Duben" },
                { id: "4-09", name: "Chalupa Markétka", icon: "home", month: "Květen" },
                { id: "4-10", name: "Můj kraj", icon: "map", month: "Červen" }
            ];

            const lessons5 = [
                { id: "5-01", name: "Renesance", icon: "history", month: "Září" },
                { id: "5-02", name: "Baroko", icon: "history", month: "Říjen" },
                { id: "5-03", name: "Klasicismus", icon: "landmark", month: "Listopad" },
                { id: "5-04", name: "Průmyslová revoluce", icon: "brick-wall", month: "Prosinec" },
                { id: "5-05", name: "Secese", icon: "history", month: "Leden" },
                { id: "5-06", name: "První republika", icon: "landmark", month: "Únor" },
                { id: "5-07", name: "Modernismus", icon: "brick-wall", month: "Březen" },
                { id: "5-08", name: "Panelové sídliště", icon: "layout-grid", month: "Duben" },
                { id: "5-09", name: "Ekologická stavba", icon: "home", month: "Květen" },
                { id: "5-10", name: "Budoucnost", icon: "zap", month: "Červen" }
            ];

            const Nav = () => (
                <div className="fixed top-0 w-full z-[100]">
                    <div className="bg-[#ef4444] text-white p-2.5 font-black uppercase text-[11px] tracking-widest text-center">
                        ⚠️ Uzávěrka pilotní série 2026: do 30. dubna. Zakázková výroba na míru.
                    </div>
                    <nav className={`w-full border-b px-8 h-24 flex justify-between items-center transition-all ${view === 'home' ? 'bg-white/95 backdrop-blur-md border-slate-200' : 'bg-slate-950 text-white border-red-600 border-b-4'}`}>
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => setView('home')}>
                            <div className="bg-slate-900 p-2.5 rounded-2xl text-white shadow-xl rotate-2 hover:rotate-0 transition-transform"><Icon name="brick-wall" size={30}/></div>
                            <div className="flex flex-col leading-none text-left">
                                <span className={`text-2xl font-black uppercase tracking-tighter italic ${view === 'home' ? 'text-slate-950' : 'text-white'}`}>Architekti <span className="text-red-600">Dějin</span></span>
                                <span className={`text-[10px] font-black uppercase tracking-[0.3em] mt-1 ml-0.5 ${view === 'home' ? 'text-slate-400' : 'text-slate-500'}`}>Škola hrou</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            {view === 'home' && <a href="#ekonomika" className="hidden lg:block text-[11px] font-black uppercase tracking-widest text-slate-400 hover:text-red-600 transition-colors">Udržitelnost</a>}
                            {view === 'home' && <a href="#rezervace" className="hidden md:flex items-center gap-3 bg-red-600 text-white px-7 py-3 rounded-full text-[11px] font-black uppercase tracking-widest shadow-xl hover:bg-slate-950 transition-all">Pilotní série</a>}
                            <button onClick={() => setView(view === 'home' ? 'portal' : 'home')} className={`${view === 'home' ? 'bg-slate-950 text-white' : 'bg-white text-slate-950'} px-8 py-3.5 rounded-full hover:bg-red-600 hover:text-white transition-all shadow-xl text-[11px] font-black uppercase flex items-center gap-3`}>
                                <Icon name={view === 'home' ? 'layout' : 'arrow-left'} size={18} className="text-red-500" /> {view === 'home' ? 'Portál' : 'Zpět na web'}
                            </button>
                        </div>
                    </nav>
                </div>
            );

            if (view === 'portal') {
                return (
                    <div className="min-h-screen bg-slate-50 text-left pt-36">
                        <Nav />
                        <div className="max-w-7xl mx-auto p-8 md:p-12 space-y-16">
                            <section>
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-8 flex items-center gap-3 text-left">
                                    <Icon name="archive" size={16}/> Školní dokumentace
                                </h2>
                                <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6 text-left">
                                    <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between hover:shadow-2xl transition-all">
                                        <div><Icon name="award" className="text-red-600 mb-4" size={24} /><h3 className="font-black uppercase text-sm mb-2 text-slate-950">Edu-Box NM-650</h3><p className="text-[10px] text-slate-500 italic leading-tight">Technický list sady.</p></div>
                                        <a href="technicky_list.pdf" download className="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-xl text-[9px] font-black uppercase text-center hover:bg-red-600 transition-all shadow-md">Stáhnout PDF</a>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between hover:shadow-2xl transition-all">
                                        <div><Icon name="shield-check" className="text-blue-600 mb-4" size={24} /><h3 className="font-black uppercase text-sm mb-2 text-slate-950">Smlouva o dílo</h3><p className="text-[10px] text-slate-500 italic leading-tight">Vzor pro Šablony OP JAK.</p></div>
                                        <a href="smlouva_o_dílo.pdf" download="smlouva_o_dílo.pdf" className="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-xl text-[9px] font-black uppercase text-center hover:bg-blue-600 transition-all shadow-md">Stáhnout PDF</a>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between hover:shadow-2xl transition-all">
                                        <div><Icon name="layout" className="text-green-600 mb-4" size={24} /><h3 className="font-black uppercase text-sm mb-2 text-slate-950">Naše prezentace</h3><p className="text-[10px] text-slate-500 italic leading-tight">Vize projektu.</p></div>
                                        <a href="prezentace.pptx" download className="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-xl text-[9px] font-black uppercase text-center hover:bg-green-600 transition-all shadow-md">Stáhnout PPTX</a>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between hover:shadow-2xl transition-all ring-2 ring-red-500">
                                        <div><Icon name="phone" className="text-red-500 mb-4" size={24} /><h3 className="font-black uppercase text-sm mb-2 text-slate-950 text-left">Grantové podklady</h3><p className="text-[10px] text-slate-500 italic leading-tight text-left">Podklady do žádosti OP JAK.</p></div>
                                        <a href="podklady_pro_sablony.pdf" download className="mt-4 w-full bg-red-600 text-white py-2.5 rounded-xl text-[9px] font-black uppercase text-center hover:bg-slate-950 transition-all shadow-md">Text do grantu</a>
                                    </div>
                                </div>
                            </section>
                            <section>
                                <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 text-left">
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] flex items-center gap-3">
                                        <Icon name="brain" size={16}/> Metodika (Digitální portál)
                                    </h2>
                                    <div className="bg-slate-200 p-1.5 rounded-2xl flex gap-2">
                                        <button onClick={() => setGrade(4)} className={`px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all ${grade === 4 ? 'bg-white shadow-md text-red-600' : 'text-slate-500 hover:text-slate-900'}`}>4. Třída</button>
                                        <button onClick={() => setGrade(5)} className={`px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all ${grade === 5 ? 'bg-white shadow-md text-blue-600' : 'text-slate-500 hover:text-slate-900'}`}>5. Třída</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                                    {(grade === 4 ? lessons4 : lessons5).map(l => (
                                        <div key={l.id} className="bg-white p-6 rounded-[2rem] border border-slate-100 flex flex-col justify-between shadow-sm hover:shadow-xl transition-all">
                                            <div>
                                                <div className="flex justify-between mb-4">
                                                    <Icon name={l.icon} className={grade === 4 ? 'text-red-600' : 'text-blue-600'} size={24}/>
                                                    <span className="text-[10px] font-black uppercase opacity-40 text-slate-950">{l.month}</span>
                                                </div>
                                                <h3 className="text-sm font-black uppercase mb-1 leading-tight text-slate-950">{l.name}</h3>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase italic text-left">Materiál {l.id}</p>
                                            </div>
                                            <a href={`${getSlug(l.name)}.pdf`} download={`${l.name}.pdf`} className="mt-6 w-full bg-slate-50 text-slate-900 py-3 rounded-xl text-[10px] font-black uppercase text-center hover:bg-slate-950 hover:text-white transition-all inline-block">PDF Verze</a>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-left bg-[#F8FAFC]">
                    <Nav />
                    <header className="pt-72 pb-32 px-8 bg-white overflow-hidden relative">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-20 items-center">
                            <div className="flex-1 text-left reveal">
                                <div className="flex flex-wrap items-center gap-3 mb-10 text-left">
                                    <span className="bg-slate-100 text-slate-900 px-4 py-2 rounded-xl text-[10px] font-black uppercase italic border border-slate-200">Škola hrou</span>
                                    <span className="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg italic">V rámci RVP</span>
                                    <span className="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg italic font-bold">Šablony OP JAK</span>
                                </div>
                                <h1 className="text-6xl sm:text-7xl lg:text-9xl font-black tracking-tight leading-[0.85] mb-10 uppercase italic text-slate-950 text-left">
                                    Děti staví<br/><span className="text-red-600">Dějiny</span>
                                </h1>
                                <p className="text-2xl text-slate-500 font-medium leading-relaxed mb-8 max-w-2xl italic border-l-[10px] border-red-600 pl-10 text-left">
                                    Mezipředmětové vazby v praxi. Dějepis, vlastivěda, <b>matematika</b> i <b>nová informatika</b> v jedné sadě LEGO® kostek. Za pomoci nejmodernějších nástrojů vč. AI jsme prošli dějiny 1000 let zpět a navrhli unikátní matematický mix barev a tvarů, se kterým lze postavit skutečně cokoliv.
                                </p>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12 max-w-3xl">
                                    <div className="bg-slate-50 p-5 rounded-3xl border border-slate-200 flex items-start gap-4">
                                        <div className="bg-red-600 p-2.5 rounded-xl text-white mt-1 shadow-lg shadow-red-200"><Icon name="users-2" size={20}/></div>
                                        <div className="text-left">
                                            <p className="text-xs font-black uppercase text-red-600 tracking-wider mb-1 leading-none">Inkluze & ADHD</p>
                                            <p className="text-sm font-medium text-slate-600 leading-snug">Ideální pro inkluzivní vzdělávání. Zapojení hmatu pomáhá dětem s ADHD se lépe soustředit a učit se prožitkem.</p>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-3xl border border-slate-200 flex items-start gap-4">
                                        <div className="bg-slate-950 p-2.5 rounded-xl text-white mt-1 shadow-lg shadow-slate-200"><Icon name="trending-up" size={20}/></div>
                                        <div className="text-left">
                                            <p className="text-xs font-black uppercase text-slate-950 tracking-wider mb-1 leading-none">IQ & Zapamatování <span className="whitespace-nowrap">75 %</span></p>
                                            <p className="text-sm font-medium text-slate-600 leading-snug">Stavění "přes ruce" prokazatelně zvyšuje IQ a zapamatování látky až na 75 % (oproti 10 % u pouhého poslechu).</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-6 text-left">
                                    <button onClick={() => setView('portal')} className="bg-slate-950 text-white px-12 py-7 rounded-[2.5rem] font-black uppercase text-sm tracking-[0.2em] shadow-2xl hover:bg-red-600 transition-all flex items-center gap-5 active:scale-95 group">
                                        Vstoupit do výuky <Icon name="arrow-right" size={24} className="group-hover:translate-x-3 transition-transform text-white" />
                                    </button>
                                    <div className="bg-white px-10 py-6 rounded-[2.5rem] border-2 border-slate-100 flex flex-col justify-center shadow-sm font-bold text-left">

                            <h2 className="text-5xl md:text-7xl font-black uppercase italic mb-10 text-slate-950 leading-[0.9]">Garance dodání 2026.</h2>
                            <div className="grid md:grid-cols-2 gap-8 mb-12 text-left">
                                <div className="bg-red-50 border-2 border-red-200 p-10 rounded-[3rem] text-left">

                                    <div className="bg-slate-800 text-slate-400 p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-center">Další doručení: Jaro 2027</div>
                                </div>
                            </div>
                            <div className="bg-slate-50 border-2 border-slate-900/10 p-10 rounded-[3rem] mb-12 flex flex-col md:flex-row items-center gap-8 w-full text-left">
                                <div className="bg-slate-900 text-white p-6 rounded-2xl rotate-[-2deg] shadow-lg text-left"><p className="text-sm font-black text-center text-left leading-none mb-2">Bonus 2026</p><Icon name="award" size={40} className="mx-auto text-red-500"/></div>
                                <div className="text-left text-slate-900">
                                    <p className="text-2xl font-black uppercase italic tracking-wider leading-tight text-slate-950">Speciální nabídka pro pilotních 20 škol:</p>
                                    <p className="text-4xl font-black uppercase mt-1 text-red-600">1x 650 LEGO® dílů NAVÍC</p>
                                    <p className="text-xs font-bold uppercase tracking-[0.1em] text-slate-400 mt-3 italic text-left leading-tight">Dostanete 11. sadu dílů zdarma v certifikovaném Gratnells boxu jako bonusovou jednotku pro učitele (platí pro objednávky do 30. 4.).</p>

                                <p className="text-xl text-slate-500 font-medium leading-relaxed mb-12 text-center italic max-w-3xl">Každá sada je unikátní kus práce, který vzniká na zakázku pro vaši školu. Předobjednáním do konce dubna si zajistíte, že vaše výuka začne se zvoněním v září.</p>
                                <a href={googleFormUrl} target="_blank" className="inline-flex items-center gap-6 bg-red-600 text-white px-16 py-8 rounded-[3rem] font-black uppercase text-sm tracking-[0.3em] shadow-2xl hover:bg-slate-950 transition-all active:scale-95 group btn-pulse shadow-red-200">

                                <div className="flex items-center gap-4 mb-6 text-red-600 text-left"><Icon name="brick-wall" size={44}/><span className="text-4xl font-black uppercase italic text-white">Architekti dějin</span></div>
                                <p className="text-[11px] font-bold uppercase tracking-[0.2em] opacity-40 text-left leading-relaxed">

                                    </a>
