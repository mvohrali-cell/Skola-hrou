<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architekti dějin | Škola hrou</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; margin: 0; padding: 0; overflow-x: hidden; }
        
        .text-gradient { 
            background: linear-gradient(to right, #ef4444, #b91c1c); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            padding-right: 0.4em;
            display: inline-block;
        }
        
        .glass { background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(20px); }
        .pulse-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .reveal { animation: reveal 0.8s ease-out forwards; opacity: 0; }
        @keyframes reveal { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 selection:bg-red-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // OPRAVA: Komponenta Icon nyní používá useRef, aby se předešlo konfliktům s DOMem Reactu
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        elements: [iconRef.current]
                    });
                }
            }, [name, size]);

            return (
                <span className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}>
                    <i 
                        ref={iconRef} 
                        data-lucide={name} 
                        style={{ width: size, height: size }}
                    ></i>
                </span>
            );
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [grade, setGrade] = useState(4);
            const [currentImg, setCurrentImg] = useState(0);
            
            const heroImages = ["image_8920a3.jpg", "foto2.jpg", "foto3.jpg"];
            const googleFormUrl = "https://forms.gle/VášeIDFormuláře";

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [view]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentImg(prev => (prev + 1) % heroImages.length), 5000);
                return () => clearInterval(timer);
            }, [heroImages.length]);

            const lessons4 = [
                { id: "4-01", name: "Stroj času", icon: "history", month: "Září", file: "metodika_4_01.pdf" },
                { id: "4-02", name: "Lovci mamutů", icon: "tent", month: "Říjen", file: "metodika_4_02.pdf" },
                { id: "4-03", name: "Keltské oppidum", icon: "shield", month: "Listopad", file: "metodika_4_03.pdf" },
                { id: "4-04", name: "Příchod Slovanů", icon: "layers", month: "Prosinec", file: "metodika_4_04.pdf" },
                { id: "4-05", name: "Velká Morava", icon: "landmark", month: "Leden", file: "metodika_4_05.pdf" },
                { id: "4-06", name: "Raní Přemyslovci", icon: "tower-control", month: "Únor", file: "metodika_4_06.pdf" },
                { id: "4-07", name: "Středověké město", icon: "layout-grid", month: "Březen", file: "metodika_4_07.pdf" },
                { id: "4-08", name: "Gotika a Karel IV.", icon: "zap", month: "Duben", file: "metodika_4_08.pdf" },
                { id: "4-09", name: "Chalupa Markétka", icon: "home", month: "Květen", file: "metodika_4_09.pdf" },
                { id: "4-10", name: "Můj kraj", icon: "map", month: "Červen", file: "metodika_4_10.pdf" }
            ];

            const lessons5 = [
                { id: "5-01", name: "Renesance", icon: "history", month: "Září", file: "metodika_5_01.pdf" },
                { id: "5-02", name: "Baroko", icon: "sun", month: "Říjen", file: "metodika_5_02.pdf" },
                { id: "5-03", name: "Klasicismus", icon: "columns-2", month: "Listopad", file: "metodika_5_03.pdf" },
                { id: "5-04", name: "Průmyslová revoluce", icon: "factory", month: "Prosinec", file: "metodika_5_04.pdf" },
                { id: "5-05", name: "Secese", icon: "flower-2", month: "Leden", file: "metodika_5_05.pdf" },
                { id: "5-06", name: "První republika", icon: "flag", month: "Únor", file: "metodika_5_06.pdf" },
                { id: "5-07", name: "Modernismus", icon: "building", month: "Březen", file: "metodika_5_07.pdf" },
                { id: "5-08", name: "Panelové sídliště", icon: "box", month: "Duben", file: "metodika_5_08.pdf" },
                { id: "5-09", name: "Ekologická stavba", icon: "sprout", month: "Květen", file: "metodika_5_09.pdf" },
                { id: "5-10", name: "Budoucnost", icon: "rocket", month: "Červen", file: "metodika_5_10.pdf" }
            ];

            if (view === 'portal') {
                return (
                    <div className="min-h-screen bg-slate-50 text-left">
                        <nav className="bg-slate-950 text-white p-6 sticky top-0 z-50 border-b-4 border-red-600 flex justify-between items-center shadow-2xl">
                            <button onClick={() => setView('home')} className="flex items-center gap-2 font-black uppercase text-[10px] tracking-widest hover:text-red-500 transition-colors">
                                <Icon name="arrow-left" size={14}/> Zpět na web
                            </button>
                            <div className="font-black uppercase italic text-lg tracking-widest flex items-center gap-3">
                                <Icon name="lock" size={18} className="text-red-500"/> Školní portál
                            </div>
                            <div className="bg-red-600 px-4 py-1 rounded font-black text-[10px] uppercase shadow-lg italic text-white">Metodická zóna</div>
                        </nav>

                        <div className="max-w-7xl mx-auto p-8 md:p-12 space-y-16 text-slate-900">
                            <section className="reveal">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-8 flex items-center gap-3">
                                    <Icon name="file-text" size={16}/> Školní dokumentace
                                </h2>
                                <div className="grid md:grid-cols-3 gap-6">
                                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between">
                                        <div>
                                            <Icon name="award" className="text-red-600 mb-4" size={32} />
                                            <h3 className="font-black uppercase text-lg mb-2 leading-tight">Edu-Box NM-650</h3>
                                            <p className="text-xs text-slate-500 font-bold uppercase italic leading-relaxed">Technická specifikace, certifikace a obsah balení.</p>
                                        </div>
                                        <a href="technicky_list.pdf" className="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black uppercase text-center hover:bg-red-600 transition-all shadow-lg">Technický list (PDF)</a>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between">
                                        <div>
                                            <Icon name="shield-check" className="text-blue-600 mb-4" size={32} />
                                            <h3 className="font-black uppercase text-lg mb-2 leading-tight">Smlouva o dílo</h3>
                                            <p className="text-xs text-slate-500 font-bold uppercase italic leading-relaxed">Vzorová smlouva pro nákup v rámci Šablon JAK.</p>
                                        </div>
                                        <a href="smlouva_o_dilo.pdf" className="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black uppercase text-center hover:bg-blue-600 transition-all shadow-lg">Stáhnout smlouvu (PDF)</a>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between">
                                        <div>
                                            <Icon name="presentation" className="text-green-600 mb-4" size={32} />
                                            <h3 className="font-black uppercase text-lg mb-2 leading-tight">Podklady pro MAS</h3>
                                            <p className="text-xs text-slate-500 font-bold uppercase italic leading-relaxed">Prezentace projektu pro regionální setkání.</p>
                                        </div>
                                        <a href="prezentace.pptx" className="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black uppercase text-center hover:bg-green-600 transition-all shadow-lg">Prezentace (PPTX)</a>
                                    </div>
                                </div>
                            </section>

                            <section className="reveal" style={{animationDelay: '0.2s'}}>
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-8 flex items-center gap-3">
                                    <Icon name="eye" size={16}/> Metodický cyklus výuky
                                </h2>
                                <div className="bg-white p-6 rounded-[3rem] shadow-xl border border-slate-200 overflow-hidden text-center">
                                    <img src="infografika edubox 650.png" alt="Infografika" className="w-full rounded-3xl" onerror="this.src='https://via.placeholder.com/1200x600?text=Metodika+EduBox'" />
                                </div>
                            </section>

                            <section className="reveal" style={{animationDelay: '0.4s'}}>
                                <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 text-left">
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] flex items-center gap-3">
                                        <Icon name="book-open" size={16}/> Projektové listy
                                    </h2>
                                    <div className="bg-slate-200 p-1.5 rounded-2xl flex gap-2">
                                        <button onClick={() => setGrade(4)} className={`px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all ${grade === 4 ? 'bg-white shadow-md text-red-600' : 'text-slate-500 hover:text-slate-900'}`}>4. Třída</button>
                                        <button onClick={() => setGrade(5)} className={`px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all ${grade === 5 ? 'bg-white shadow-md text-blue-600' : 'text-slate-500 hover:text-slate-900'}`}>5. Třída</button>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-2 lg:grid-cols-5 gap-6 text-left">
                                    {(grade === 4 ? lessons4 : lessons5).map(l => (
                                        <div key={l.id} className="bg-white p-8 rounded-[2rem] border border-slate-100 flex flex-col justify-between shadow-sm hover:shadow-xl transition-all">
                                            <div className="text-left">
                                                <div className="flex justify-between mb-4"><Icon name={l.icon} className={grade === 4 ? 'text-red-600' : 'text-blue-600'} size={24}/><span className="text-[10px] font-black uppercase opacity-40">{l.month}</span></div>
                                                <h3 className="text-sm font-black uppercase mb-1 leading-tight">{l.name}</h3>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase italic">Materiál {l.id}</p>
                                            </div>
                                            <a href={l.file} className="mt-6 w-full bg-slate-50 text-slate-900 py-3 rounded-xl text-[10px] font-black uppercase text-center hover:bg-slate-950 hover:text-white transition-all">Stáhnout PDF</a>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-left">
                    <nav className="fixed top-0 w-full glass z-[100] border-b border-slate-200 px-8 h-24 flex justify-between items-center transition-all">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                            <div className="bg-red-600 p-2.5 rounded-2xl text-white shadow-xl rotate-2 hover:rotate-0 transition-transform"><Icon name="brick-wall" size={30}/></div>
                            <div className="flex flex-col leading-none text-left">
                                <span className="text-2xl font-black uppercase tracking-tighter italic text-slate-950 text-left">Architekti <span className="text-gradient">Dějin</span></span>
                                <span className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 mt-1 ml-0.5 text-left">Škola hrou</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                             <a href="#ekonomika" className="hidden lg:block text-[11px] font-black uppercase tracking-widest text-slate-400 hover:text-red-600 transition-colors">Udržitelnost</a>
                             <a href="#rezervace" className="hidden md:flex items-center gap-3 bg-red-600 text-white px-7 py-3 rounded-full text-[11px] font-black uppercase tracking-widest shadow-xl hover:bg-slate-950 transition-all pulse-red text-center">Pilotní série</a>
                             <button onClick={() => setView('portal')} className="bg-slate-950 text-white px-8 py-3.5 rounded-full hover:bg-red-600 transition-all shadow-xl text-[11px] font-black uppercase tracking-widest flex items-center gap-3 group">
                                <Icon name="layout" size={18} className="text-red-500 group-hover:text-white" /> Portál
                             </button>
                        </div>
                    </nav>

                    <header className="pt-64 pb-32 px-8 relative overflow-hidden bg-white text-left">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-20 items-center text-left">
                            <div className="text-left flex-1 w-full reveal text-left">
                                <div className="flex flex-wrap items-center gap-3 mb-10 text-left">
                                    <span className="bg-slate-100 text-slate-900 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest italic border border-slate-200">Škola hrou</span>
                                    <span className="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">Šablony JAK</span>
                                    <span className="bg-blue-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg italic">Vyrobeno v Novém Malíně</span>
                                </div>
                                <h1 className="text-6xl sm:text-7xl lg:text-8xl xl:text-9xl font-black tracking-tight leading-[0.85] mb-10 uppercase italic text-slate-950">
                                    Děti staví<br/><span className="text-gradient">Dějiny</span>
                                </h1>
                                <p className="text-2xl text-slate-500 font-medium leading-relaxed mb-12 max-w-2xl italic border-l-[10px] border-red-600 pl-10 text-left">
                                    Mezipředmětové vazby v praxi. Dějepis, vlastivěda, <b>matematika</b> (měřítko, symetrie) i <b>nová informatika</b> (3D blueprinty) v jedné sadě LEGO® kostek.
                                </p>
                                <div className="flex flex-wrap gap-6 text-left">
                                    <button onClick={() => setView('portal')} className="bg-slate-950 text-white px-12 py-7 rounded-[2.5rem] font-black uppercase text-sm tracking-[0.2em] shadow-2xl hover:bg-red-600 transition-all flex items-center gap-5 active:scale-95 group text-left">
                                        Vstoupit do výuky <Icon name="arrow-right" size={24} className="group-hover:translate-x-3 transition-transform text-white" />
                                    </button>
                                    <div className="bg-white px-10 py-6 rounded-[2.5rem] border-2 border-slate-100 flex flex-col justify-center text-left shadow-sm font-bold">
                                        <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">Plně v souladu</p>
                                        <p className="text-lg font-black text-slate-950 italic leading-none uppercase">s metodikou RVP</p>
                                    </div>
                                </div>
                            </div>

                            <div className="relative w-full lg:max-w-[480px] reveal text-left" style={{animationDelay: '0.2s'}}>
                                <div className="bg-white p-3 rounded-[4.5rem] shadow-[0_60px_120px_rgba(0,0,0,0.12)] border border-slate-100 overflow-hidden aspect-[3/4] flex items-center justify-center transform lg:-rotate-1 hover:rotate-0 transition-all duration-700 relative">
                                    {heroImages.map((img, idx) => (
                                        <img key={img} src={img} alt={`Slide ${idx}`} className={`absolute inset-0 w-full h-full object-cover rounded-[4rem] transition-opacity duration-1000 ${idx === currentImg ? 'opacity-100' : 'opacity-0'}`} onerror="this.src='https://via.placeholder.com/600x800?text=Architekti+Dejin'"/>
                                    ))}
                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-950/40 via-transparent to-transparent pointer-events-none"></div>
                                </div>
                                <div className="absolute -bottom-10 -left-10 bg-red-600 text-white p-10 rounded-[3rem] shadow-2xl z-20 max-w-[240px] border-8 border-white text-left">
                                    <Icon name="brain" size={40} className="mb-4 text-white"/>
                                    <p className="text-sm font-black uppercase tracking-widest leading-tight italic text-left text-white">Až 80 hodin inovativní projektové výuky</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <section id="ekonomika" className="py-24 px-8 bg-slate-900 text-white text-left">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-3 gap-16 items-center">
                            <div className="lg:col-span-2 text-left">
                                <h2 className="text-4xl font-black uppercase italic tracking-tighter mb-8 leading-none">Financování a udržitelnost</h2>
                                <p className="text-xl text-slate-400 font-medium italic leading-relaxed mb-8">
                                    Hardware zůstává majetkem školy. Systém je plně uznatelným nákladem pro <b>Šablony OP JAK</b> (Aktivita: Inovativní vzdělávání).
                                </p>
                                <div className="grid sm:grid-cols-2 gap-10">
                                    <div className="bg-white/5 p-8 rounded-3xl border border-white/10">
                                        <p className="text-5xl font-black text-red-500 mb-2 italic">~ 27 Kč</p>
                                        <p className="text-xs font-black uppercase tracking-widest text-slate-300 italic">Investice na žáka / hodinu</p>
                                        <p className="text-[10px] text-slate-500 mt-4 uppercase font-bold italic">Při využití 60 hodin dotované výuky</p>
                                    </div>
                                    <div className="flex flex-col justify-center space-y-4 font-bold">
                                        <div className="flex items-center gap-4"><Icon name="check-circle" className="text-green-500" size={20}/><p className="text-sm italic">Vhodné pro Šablony OP JAK</p></div>
                                        <div className="flex items-center gap-4"><Icon name="check-circle" className="text-green-500" size={20}/><p className="text-sm italic">Dlouhodobý hardware</p></div>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-white/10 p-10 rounded-[3rem] border border-white/20">
                                <h4 className="text-2xl font-black uppercase italic mb-6">Pracovní cyklus</h4>
                                <div className="space-y-6">
                                    <div className="border-l-4 border-red-600 pl-6"><p className="font-black text-[10px] uppercase text-red-500 mb-1 font-bold">Fáze A</p><p className="font-bold text-white italic">Konstrukce jádra & kontextu</p></div>
                                    <div className="border-l-4 border-blue-600 pl-6"><p className="font-black text-[10px] uppercase text-blue-500 mb-1 font-bold">Fáze B</p><p className="font-bold text-white italic">Optimalizace modelu</p></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="rezervace" className="py-40 px-8 bg-white relative border-y border-slate-100 scroll-mt-24 text-center">
                        <div className="max-w-4xl mx-auto reveal">
                            <span className="bg-red-50 text-red-600 px-5 py-2 rounded-full text-[11px] font-black uppercase tracking-widest mb-8 inline-block border border-red-100 italic font-bold">Limitovaná pilotní série 2026</span>
                            <h2 className="text-5xl md:text-7xl font-black uppercase italic tracking-tighter mb-10 leading-[0.9] text-slate-950">Máte zájem? <br/>Rezervujte si svůj box.</h2>
                            <p className="text-xl text-slate-500 font-medium italic leading-relaxed mb-12 max-w-2xl mx-auto">
                                Pro předběžnou rezervaci a specifikaci požadavků (sady, zaškolení, dodání) prosím využijte náš krátký dotazník na Google Forms. Ozveme se vám zpět.
                            </p>
                            
                            <div className="flex flex-col md:flex-row justify-center gap-6 mb-16">
                                <div className="bg-slate-50 p-6 rounded-[2rem] flex items-center gap-4 border border-slate-100">
                                    <div className="bg-white p-3 rounded-2xl text-red-600 shadow-sm"><Icon name="check-square" size={24}/></div>
                                    <div className="text-left"><p className="font-black uppercase text-[10px] italic">Konfigurace</p><p className="text-slate-500 text-xs italic font-bold">Na klíč dle potřeb</p></div>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-[2rem] flex items-center gap-4 border border-slate-100">
                                    <div className="bg-white p-3 rounded-2xl text-blue-600 shadow-sm"><Icon name="truck" size={24}/></div>
                                    <div className="text-left"><p className="font-black uppercase text-[10px] italic">Doručení</p><p className="text-slate-500 text-xs italic font-bold">Regionální rozvoz</p></div>
                                </div>
                            </div>
                            
                            <a href={googleFormUrl} target="_blank" className="inline-flex items-center gap-6 bg-red-600 text-white px-16 py-8 rounded-[3rem] font-black uppercase text-sm tracking-[0.3em] shadow-2xl hover:bg-slate-950 transition-all active:scale-95 group pulse-red">
                                Vyplnit dotazník <Icon name="external-link" size={24} className="group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"/>
                            </a>
                        </div>
                    </section>

                    <section id="kontakt" className="py-32 px-8 bg-slate-950 text-white relative text-left scroll-mt-24">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-24 items-start text-white">
                            <div>
                                <h2 className="text-xs font-black uppercase tracking-[0.5em] text-red-500 mb-8 italic font-bold">MAS & MAP Podpora</h2>
                                <h3 className="text-5xl md:text-6xl font-black uppercase italic tracking-tighter mb-10 leading-[0.95] text-white">Regionální prezentace<br/>na poradách ředitelů</h3>
                                <p className="text-xl text-slate-400 font-medium italic leading-relaxed mb-12 max-w-lg">Přijedeme k vám do regionu. Předvedeme systém všem ředitelům najednou a probereme technickou specifikaci pro Šablony JAK.</p>
                            </div>
                            <div className="bg-white/5 p-12 rounded-[4rem] border border-white/10">
                                <Icon name="users" size={48} className="text-red-500 mb-8"/>
