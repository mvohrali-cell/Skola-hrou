<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architekti dějin | Škola hrou</title>
    
    <!-- Produkční knihovny pro běh přímo v prohlížeči (bez instalace) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; margin: 0; padding: 0; }
        
        /* FIX: Oprava ořezu písmene N a barevného gradientu */
        .text-gradient { 
            background: linear-gradient(to right, #ef4444, #b91c1c); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            padding-right: 0.35em; /* Dostatečný prostor pro vyčnívající části písmene N */
            display: inline-block;
        }
        
        .hero-image { object-fit: cover; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .hero-image:hover { transform: scale(1.05); }
        .glass { background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(20px); }
        
        .pulse-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        .reveal { animation: reveal 0.8s ease-out forwards; opacity: 0; }
        @keyframes reveal { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 selection:bg-red-500 selection:text-white">
    <div id="root"></div>

    <!-- Tady začíná React kód - bez IMPORTŮ -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Komponenta pro ikony využívající globální Lucide objekt (funguje v HTML)
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) { 
                    window.lucide.createIcons(); 
                } 
            }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [currentImgIndex, setCurrentImgIndex] = useState(0);

            // Názvy obrázků - ideální poměr 3:4 na výšku
            const heroImages = ["image_8920a3.jpg", "foto2.jpg", "foto3.jpg"];

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentImgIndex((prev) => (prev + 1) % heroImages.length);
                }, 5000);
                return () => clearInterval(timer);
            }, [heroImages.length]);

            if (view === 'portal') {
                return (
                    <div className="min-h-screen bg-slate-50 text-left">
                        <nav className="bg-slate-950 text-white p-6 sticky top-0 z-50 border-b-4 border-red-600 flex justify-between items-center shadow-2xl">
                            <button onClick={() => setView('home')} className="flex items-center gap-2 font-black uppercase text-[10px] tracking-widest hover:text-red-500 transition-colors">
                                <Icon name="arrow-left" size={14}/> Zpět na web
                            </button>
                            <div className="flex items-center gap-3 font-black uppercase italic text-lg tracking-widest text-white text-left">
                                <Icon name="lock" size={18} className="text-red-500"/> Školní portál
                            </div>
                            <div className="bg-red-600 px-4 py-1 rounded font-black text-[10px] uppercase shadow-lg tracking-widest italic text-white text-left">Metodická zóna</div>
                        </nav>
                        <div className="max-w-7xl mx-auto p-8 md:p-12 space-y-16 text-left">
                            <section className="reveal text-left">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-8 flex items-center gap-3 text-left">
                                    <Icon name="eye" size={16}/> Metodický přehled a vizualizace
                                </h2>
                                <div className="bg-white p-6 rounded-[3rem] shadow-xl border border-slate-200 overflow-hidden text-left">
                                    <img src="infografika edubox 650.png" alt="Infografika" className="w-full rounded-3xl" onerror="this.src='https://via.placeholder.com/1200x600?text=Metodika+EduBox'" />
                                </div>
                            </section>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-left">
                    {/* NAVBAR */}
                    <nav className="fixed top-0 w-full glass z-[100] border-b border-slate-200 px-8 h-24 flex justify-between items-center transition-all">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                            <div className="bg-red-600 p-2.5 rounded-2xl text-white shadow-xl rotate-2 hover:rotate-0 transition-transform"><Icon name="brick-wall" size={30}/></div>
                            <div className="flex flex-col leading-none text-left">
                                <span className="text-2xl font-black uppercase tracking-tighter italic text-slate-950 text-left">Architekti <span className="text-gradient text-left">Dějin</span></span>
                                <span className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 mt-1 ml-0.5 text-left text-slate-400">Škola hrou</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                             <a href="#ekonomika" className="hidden lg:block text-[11px] font-black uppercase tracking-widest text-slate-400 hover:text-red-600 transition-colors">Udržitelnost</a>
                             <a href="#koupit" className="hidden md:flex items-center gap-3 bg-red-600 text-white px-7 py-3 rounded-full text-[11px] font-black uppercase tracking-widest shadow-xl hover:bg-slate-950 transition-all pulse-red text-white text-center">Pilotní série</a>
                             <button onClick={() => setView('portal')} className="bg-slate-950 text-white px-8 py-3.5 rounded-full hover:bg-red-600 transition-all shadow-xl text-[11px] font-black uppercase tracking-widest flex items-center gap-3 group text-left">
                                <Icon name="layout" size={18} className="text-red-500 group-hover:text-white" /> Portál
                             </button>
                        </div>
                    </nav>

                    {/* HERO SECTION */}
                    <header className="pt-64 pb-32 px-8 relative overflow-hidden bg-white text-left">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-20 items-center text-left text-slate-900">
                            <div className="text-left flex-1 w-full reveal text-left">
                                <div className="flex flex-wrap items-center gap-3 mb-10 text-left">
                                    <span className="bg-slate-100 text-slate-900 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest italic border border-slate-200 text-left">Škola hrou</span>
                                    <span className="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg text-left">Šablony JAK</span>
                                    <span className="bg-blue-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg italic text-left">Vyrobeno v Novém Malíně</span>
                                </div>
                                <h1 className="text-6xl sm:text-7xl lg:text-8xl xl:text-9xl font-black tracking-tight leading-[0.85] mb-10 uppercase italic text-slate-950 text-left">
                                    Děti staví<br/><span className="text-gradient text-left">Dějiny</span>
                                </h1>
                                <p className="text-2xl text-slate-500 font-medium leading-relaxed mb-12 max-w-2xl italic border-l-[10px] border-red-600 pl-10 text-left text-slate-500 text-left">
                                    Mezipředmětové vazby v praxi. Dějepis, vlastivěda, <b>matematika</b> (měřítko, symetrie) i <b>nová informatika</b> (3D modelování a digitální blueprinty) v jedné sadě LEGO® kostek.
                                </p>
                                <div className="flex flex-wrap gap-6 text-left">
                                    <button onClick={() => setView('portal')} className="bg-slate-950 text-white px-12 py-7 rounded-[2.5rem] font-black uppercase text-sm tracking-[0.2em] shadow-2xl hover:bg-red-600 transition-all flex items-center gap-5 active:scale-95 group text-left">
                                        Vstoupit do výuky <Icon name="arrow-right" size={24} className="group-hover:translate-x-3 transition-transform text-white" />
                                    </button>
                                    <div className="bg-white px-10 py-6 rounded-[2.5rem] border-2 border-slate-100 flex flex-col justify-center text-left text-slate-950 shadow-sm">
                                        <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none text-left">Plně v souladu</p>
                                        <p className="text-lg font-black text-slate-950 italic leading-none uppercase text-left text-slate-950">s metodikou RVP</p>
                                    </div>
                                </div>
                            </div>

                            {/* GALERIE FOTEK NA VÝŠKU */}
                            <div className="relative w-full lg:max-w-[480px] reveal text-left" style={{animationDelay: '0.2s'}}>
                                <div className="bg-white p-3 rounded-[4.5rem] shadow-[0_60px_120px_rgba(0,0,0,0.12)] border border-slate-100 overflow-hidden aspect-[3/4] flex items-center justify-center transform lg:-rotate-1 hover:rotate-0 transition-all duration-700 relative text-left">
                                    {heroImages.map((img, idx) => (
                                        <img key={img} src={img} alt={`Slide ${idx}`} className={`absolute inset-0 w-full h-full object-cover rounded-[4rem] transition-opacity duration-1000 ${idx === currentImgIndex ? 'opacity-100' : 'opacity-0'}`} onerror="this.src='https://via.placeholder.com/600x800?text=Architekti+Dejin'"/>
                                    ))}
                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-950/40 via-transparent to-transparent pointer-events-none text-left"></div>
                                </div>
                                <div className="absolute -bottom-10 -left-10 bg-red-600 text-white p-10 rounded-[3rem] shadow-2xl z-20 max-w-[240px] border-8 border-white text-left text-white">
                                    <Icon name="brain" size={40} className="mb-4 text-white text-left"/>
                                    <p className="text-sm font-black uppercase tracking-widest leading-tight italic text-left text-white">Až 80 hodin inovativní projektové výuky</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* EKONOMIKA */}
                    <section id="ekonomika" className="py-24 px-8 bg-slate-900 text-white text-left text-white">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-3 gap-16 items-center text-left text-white">
                            <div className="lg:col-span-2 text-left">
                                <h2 className="text-4xl font-black uppercase italic tracking-tighter mb-8 leading-none text-left text-white">Ekonomická udržitelnost</h2>
                                <p className="text-xl text-slate-400 font-medium italic leading-relaxed mb-8 text-left text-slate-400">
                                    Hardware zůstává majetkem školy. S <b>nulovými náklady na spotřební materiál</b> zaručujeme návratnost investice již v prvním roce. Systém je plně uznatelným nákladem pro <b>Šablony OP JAK</b>.
                                </p>
                                <div className="grid sm:grid-cols-2 gap-10 text-left text-white">
                                    <div className="bg-white/5 p-8 rounded-3xl border border-white/10 text-left text-white">
                                        <p className="text-5xl font-black text-red-500 mb-2 italic text-left text-red-500">~ 27 Kč</p>
                                        <p className="text-xs font-black uppercase tracking-widest text-slate-300 italic text-left text-slate-300">Investice na žáka / hodinu</p>
                                        <p className="text-[10px] text-slate-500 mt-4 uppercase font-bold italic text-left text-slate-500 text-left">Při využití 60 hodin dotované výuky</p>
                                    </div>
                                    <div className="flex flex-col justify-center space-y-4 text-left text-white">
                                        <div className="flex items-center gap-4 text-left text-white font-bold"><Icon name="check-circle" className="text-green-500 text-left text-green-500" size={20}/><p className="text-sm italic text-left text-white">Vhodné pro Šablony OP JAK</p></div>
                                        <div className="flex items-center gap-4 text-left text-white font-bold"><Icon name="check-circle" className="text-green-500 text-left text-green-500" size={20}/><p className="text-sm italic text-left text-white">Dlouhodobá hodnota HW</p></div>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-white/10 p-10 rounded-[3rem] border border-white/20 text-left text-white">
                                <h4 className="text-2xl font-black uppercase italic mb-6 text-left">Pracovní cyklus</h4>
                                <div className="space-y-6 text-left text-white">
                                    <div className="border-l-4 border-red-600 pl-6 text-left text-white"><p className="font-black text-[10px] uppercase text-red-500 mb-1 font-bold">Fáze A</p><p className="font-bold text-white italic text-left text-white">Konstrukce jádra & kontextu</p></div>
                                    <div className="border-l-4 border-blue-600 pl-6 text-left text-white"><p className="font-black text-[10px] uppercase text-blue-500 mb-1 font-bold">Fáze B</p><p className="font-bold text-white italic text-left text-white text-white">Optimalizace modelu</p></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CENA */}
                    <section id="koupit" className="py-32 px-8 bg-white relative border-y border-slate-100 scroll-mt-24 text-left text-slate-900">
                        <div className="max-w-7xl mx-auto text-left text-slate-900">
                            <div className="grid lg:grid-cols-[1.1fr_0.9fr] gap-20 items-center text-left text-slate-900">
                                <div className="text-left text-slate-900">
                                    <span className="bg-red-50 text-red-600 px-5 py-2 rounded-full text-[11px] font-black uppercase tracking-widest mb-8 inline-block border border-red-100 italic font-bold text-left">Limitovaná pilotní série 2026</span>
                                    <h2 className="text-5xl md:text-6xl font-black uppercase italic tracking-tighter mb-10 leading-[0.9] text-left text-slate-950">Inovace na klíč</h2>
                                    <div className="space-y-8 mb-12 text-left text-slate-900">
                                        <div className="flex items-start gap-6 group text-left text-slate-900">
                                            <div className="bg-blue-50 text-blue-600 p-3 rounded-2xl group-hover:bg-blue-600 group-hover:text-white transition-colors shadow-lg text-left text-blue-600"><Icon name="users" size={28}/></div>
                                            <div className="text-left text-slate-900">
                                                <p className="text-xl font-black italic text-left text-slate-900">Regionální zaškolení v ceně</p>
                                                <p className="text-slate-500 text-sm italic font-medium text-left">Workshop pro pedagogy v rámci regionální MAS / MAP center.</p>
                                            </div>
                                        </div>
                                        <div className="bg-gradient-to-br from-blue-600 to-blue-800 p-10 rounded-[3rem] text-white shadow-2xl relative overflow-hidden text-left text-white">
                                            <p className="text-[11px] font-black uppercase mb-4 opacity-80 text-left font-bold text-white text-left text-white">Bonus pro prvních 20 partnerů</p>
                                            <ul className="space-y-4 font-bold italic text-lg text-left text-white">
                                                <li className="flex items-center gap-3 text-left text-white font-bold text-white text-left"><Icon name="plus" size={20}/><p>1 box Edu-Box NM-650 navíc <b>ZDARMA</b></p></li>
                                                <li className="flex items-center gap-3 text-left text-white font-bold text-white text-left"><Icon name="plus" size={20}/><p>Regionálně diferencovaný balíček</p></li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-slate-950 p-16 rounded-[4.5rem] text-white shadow-3xl text-left relative group overflow-hidden text-left text-white">
                                    <div className="absolute top-0 right-0 p-12 text-white/5 group-hover:scale-110 transition-transform text-white text-left"><Icon name="shopping-cart" size={180}/></div>
                                    <p className="text-[11px] font-black uppercase opacity-40 mb-6 italic text-left font-bold text-white">Cena balíčku (10+1 sad + zaškolení)</p>
                                    <p className="text-8xl font-black italic tracking-tighter mb-8 text-left text-white">49 800<span className="text-3xl font-bold ml-2 opacity-50 underline decoration-red-600 decoration-8 text-white">Kč</span></p>
                                    <div className="space-y-4 mb-12 text-left text-white font-bold text-white">
                                        <div className="flex items-center gap-3 text-left text-white font-bold text-white"><Icon name="check" size={18} className="text-green-500 text-green-500"/><p className="text-sm italic opacity-80 text-left text-white text-left">Originální LEGO® díly</p></div>
                                        <div className="flex items-center gap-3 text-left text-white font-bold text-white"><Icon name="check" size={18} className="text-green-500 text-green-500"/><p className="text-sm italic opacity-80 text-left text-white text-left">Školní standard Grattnells</p></div>
                                    </div>
                                    <a href="#kontakt" className="block w-full bg-red-600 text-white py-7 rounded-3xl font-black uppercase text-sm tracking-[0.3em] hover:bg-white hover:text-slate-950 transition-all shadow-2xl text-center active:scale-95 text-white font-bold text-center">Nezávazně rezervovat</a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* KONTAKT */}
                    <section id="kontakt" className="py-32 px-8 bg-slate-950 text-white relative text-left scroll-mt-24 text-white text-left">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-24 items-start text-left text-white">
                            <div className="text-left text-white">
                                <h2 className="text-xs font-black uppercase tracking-[0.5em] text-red-500 mb-8 italic text-left font-bold text-red-500">MAS & MAP Podpora</h2>
                                <h3 className="text-5xl md:text-6xl font-black uppercase italic tracking-tighter mb-10 leading-[0.95] text-left text-white text-left">Regionální prezentace<br/>na poradách ředitelů</h3>
                                <p className="text-xl text-slate-400 font-medium italic leading-relaxed mb-12 max-w-lg text-left text-slate-400">Přijedeme k vám do regionu. Předvedeme systém všem ředitelům najednou a probereme technickou specifikaci pro Šablony JAK.</p>
                            </div>
                            <div className="bg-white p-12 rounded-[4rem] text-slate-950 shadow-3xl text-left reveal text-left">
                                <form action="https://formspree.io/f/vohralmartin@gmail.com" method="POST" className="space-y-6 text-left text-slate-900">
                                    <div className="grid md:grid-cols-2 gap-6 text-left">
                                        <div className="text-left"><label className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 block mb-3 text-left font-bold text-slate-400">Jméno / MAS</label><input type="text" name="name" required className="w-full bg-slate-100 border-2 border-transparent rounded-2xl px-5 py-4 text-sm focus:bg-white focus:border-red-600 outline-none transition-all text-left" placeholder="ZŠ / MAS..." /></div>
                                        <div className="text-left"><label className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 block mb-3 text-left font-bold text-slate-400">E-mail</label><input type="email" name="_replyto" required className="w-full bg-slate-100 border-2 border-transparent rounded-2xl px-5 py-4 text-sm focus:bg-white focus:border-red-600 outline-none transition-all text-left" placeholder="vohralmartin@gmail.com" /></div>
                                    </div>
                                    <div className="text-left font-bold"><label className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 block mb-3 text-left text-slate-400">Zájem o:</label><select name="interest" className="w-full bg-slate-100 border-2 border-transparent rounded-2xl px-5 py-4 text-sm focus:bg-white focus:border-red-600 outline-none appearance-none font-bold italic text-left text-slate-900"><option>Nákup pilotní série se zaškolením</option><option>Prezentace na poradě ředitelů</option><option>Jiné dotazy</option></select></div>
                                    <div className="text-left font-bold text-slate-900"><label className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 block mb-3 text-left font-bold text-left text-slate-400">Zpráva</label><textarea name="message" required rows="3" className="w-full bg-slate-100 border-2 border-transparent rounded-2xl px-5 py-4 text-sm focus:bg-white focus:border-red-600 outline-none text-left text-slate-900" placeholder="Dobrý den..."></textarea></div>
                                    <button type="submit" className="w-full bg-red-600 text-white py-6 rounded-3xl font-black uppercase text-[11px] tracking-[0.3em] hover:bg-slate-950 transition-all flex justify-center items-center gap-4 text-white font-bold text-center">Odeslat rezervaci <Icon name="send" size={20}/></button>
                                </form>
                            </div>
                        </div>
                    </section>

                    {/* KVALITA BOXŮ */}
                    <section className="py-20 px-8 bg-[#F1F5F9] border-t border-slate-200 text-left text-slate-950">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-12 text-left text-slate-950">
                            <div className="flex items-center gap-8 text-left text-slate-950">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 text-red-600 text-left text-red-600"><Icon name="award" size={48} className="text-red-600"/></div>
                                <div className="text-left leading-tight text-slate-950 text-left">
                                    <p className="text-[10px] font-black uppercase text-slate-400 mb-2 italic text-left font-bold text-slate-400">Prémiová kvalita</p>
                                    <p className="text-2xl font-black uppercase italic tracking-tighter text-left text-slate-950">LEGO® & Grattnells</p>
                                </div>
                            </div>
                            <div className="hidden lg:block w-px h-20 bg-slate-300 text-left text-slate-300"></div>
                            <div className="text-left max-w-lg text-slate-500 font-bold uppercase italic text-[13px] leading-relaxed text-left text-slate-500">
                                Používáme výhradně boxy <b>Grattnells</b> – světově uznávaný standard milovaný pedagogy pro odolnost a stohovatelnost. Hardware připravujeme s péčí v <b>Novém Malíně</b>.
                            </div>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="bg-slate-950 text-white py-24 px-8 border-t-[10px] border-red-600 text-left text-white">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-16 text-center md:text-left text-white text-left">
                            <div className="text-left text-white text-left">
                                <div className="flex items-center gap-4 mb-6 text-left text-white text-red-600"><Icon name="brick-wall" size={44}/><span className="text-4xl font-black uppercase italic text-left text-white">Architekti dějin</span></div>
                                <p className="text-[11px] font-bold uppercase tracking-[0.5em] opacity-40 text-left text-white opacity-40 text-left">Nový Malín // Martin Vohralík // 2026</p>
                            </div>
