<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architekti dějin | Škola hrou</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; margin: 0; padding: 0; overflow-x: hidden; }
        .text-gradient { background: linear-gradient(to right, #ef4444, #b91c1c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; padding-right: 0.2em; }
        .glass { background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(20px); }
        .reveal { animation: reveal 0.8s ease-out forwards; opacity: 0; }
        @keyframes reveal { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .btn-pulse { animation: btn-pulse 2s infinite; }
        @keyframes btn-pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 text-left">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => { if (window.lucide && iconRef.current) { window.lucide.createIcons({ elements: [iconRef.current] }); } }, [name]);
            return <span className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}><i ref={iconRef} data-lucide={name} style={{ width: size, height: size }}></i></span>;
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [grade, setGrade] = useState(4);
            const googleFormUrl = "https://forms.gle/RhHPDeaRrZQ1vspMA";
            
            const lessons4 = [
                { id: "4-01", name: "Stroj času", icon: "history", month: "Září" },
                { id: "4-02", name: "Lovci mamutů", icon: "tent", month: "Říjen" },
                { id: "4-03", name: "Keltské oppidum", icon: "shield", month: "Listopad" },
                { id: "4-04", name: "Příchod Slovanů", icon: "layers", month: "Prosinec" },
                { id: "4-05", name: "Velká Morava", icon: "landmark", month: "Leden" },
                { id: "4-06", name: "Raní Přemyslovci", icon: "tower-control", month: "Únor" },
                { id: "4-07", name: "Středověké město", icon: "layout-grid", month: "Březen" },
                { id: "4-08", name: "Gotika a Karel IV.", icon: "zap", month: "Duben" },
                { id: "4-09", name: "Chalupa Markétka", icon: "home", month: "Květen" },
                { id: "4-10", name: "Můj kraj", icon: "map", month: "Červen" }
            ];

            const lessons5 = [
                { id: "5-01", name: "Renesance", icon: "history", month: "Září" },
                { id: "5-02", name: "Baroko", icon: "sun", month: "Říjen" },
                { id: "5-03", name: "Klasicismus", icon: "columns-2", month: "Listopad" },
                { id: "5-04", name: "Průmyslová revoluce", icon: "factory", month: "Prosinec" },
                { id: "5-05", name: "Secese", icon: "flower-2", month: "Leden" },
                { id: "5-06", name: "První republika", icon: "flag", month: "Únor" },
                { id: "5-07", name: "Modernismus", icon: "building", month: "Březen" },
                { id: "5-08", name: "Panelové sídliště", icon: "box", month: "Duben" },
                { id: "5-09", name: "Ekologická stavba", icon: "sprout", month: "Květen" },
                { id: "5-10", name: "Budoucnost", icon: "rocket", month: "Červen" }
            ];

            if (view === 'portal') {
                return (
                    <div className="min-h-screen bg-slate-50 text-left">
                        <nav className="bg-slate-950 text-white p-6 sticky top-0 z-50 border-b-4 border-red-600 flex justify-between items-center shadow-2xl">
                            <button onClick={() => setView('home')} className="flex items-center gap-2 font-black uppercase text-[10px] tracking-widest hover:text-red-500 transition-colors"><Icon name="arrow-left" size={14}/> Zpět</button>
                            <div className="font-black uppercase italic text-lg tracking-widest flex items-center gap-3"><Icon name="lock" size={18} className="text-red-500"/> Školní portál</div>
                            <div className="bg-red-600 px-4 py-1 rounded font-black text-[10px] uppercase italic text-white">Metodická zóna</div>
                        </nav>
                        <div className="max-w-7xl mx-auto p-8 md:p-12 space-y-16">
                            <section className="reveal">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-8">Dokumentace</h2>
                                <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between">
                                        <div><Icon name="award" className="text-red-600 mb-4" size={32} /><h3 className="font-black uppercase text-lg mb-2">Edu-Box NM-650</h3><p className="text-xs text-slate-500">Technický list sady.</p></div>
                                        <a href="technicky_list.pdf" download className="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black text-center hover:bg-red-600 transition-all">Stáhnout PDF</a>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between">
                                        <div><Icon name="shield-check" className="text-blue-600 mb-4" size={32} /><h3 className="font-black uppercase text-lg mb-2">Smlouva o dílo</h3><p className="text-xs text-slate-500">Vzor pro Šablony.</p></div>
                                        <a href="smlouva_o_dílo.pdf" download className="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black text-center hover:bg-blue-600 transition-all">Stáhnout PDF</a>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between">
                                        <div><Icon name="presentation" className="text-green-600 mb-4" size={32} /><h3 className="font-black uppercase text-lg mb-2">Naše prezentace</h3><p className="text-xs text-slate-500">Koncept projektu.</p></div>
                                        <a href="prezentace.pptx" download className="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black text-center hover:bg-green-600 transition-all">Stáhnout PPTX</a>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between ring-2 ring-red-500/20">
                                        <div><Icon name="file-edit" className="text-red-500 mb-4" size={32} /><h3 className="font-black uppercase text-lg mb-2">Grantový text</h3><p className="text-xs text-slate-500">Podklady do žádosti.</p></div>
                                        <a href="podklady_pro_sablony.pdf" download className="mt-6 w-full bg-red-600 text-white py-3 rounded-xl text-[10px] font-black text-center hover:bg-slate-900 transition-all">Stáhnout PDF</a>
                                    </div>
                                </div>
                            </section>

                            <section className="reveal">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em]">Digitální metodika</h2>
                                    <div className="bg-slate-200 p-1.5 rounded-2xl flex gap-2">
                                        <button onClick={() => setGrade(4)} className={`px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all ${grade === 4 ? 'bg-white shadow-md text-red-600' : 'text-slate-500 hover:text-slate-900'}`}>4. Třída</button>
                                        <button onClick={() => setGrade(5)} className={`px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all ${grade === 5 ? 'bg-white shadow-md text-blue-600' : 'text-slate-500 hover:text-slate-900'}`}>5. Třída</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-5 gap-6">
                                    {(grade === 4 ? lessons4 : lessons5).map(l => (
                                        <div key={l.id} className="bg-white p-6 rounded-[2rem] border border-slate-100 flex flex-col justify-between shadow-sm hover:shadow-xl transition-all">
                                            <div>
                                                <div className="flex justify-between mb-4"><Icon name={l.icon} className={grade === 4 ? 'text-red-600' : 'text-blue-600'} size={24}/><span className="text-[10px] font-black uppercase opacity-40">{l.month}</span></div>
                                                <h3 className="text-sm font-black uppercase mb-1 leading-tight">{l.name}</h3>
                                                <p className="text-[10px] text-slate-400 italic">Materiál {l.id}</p>
                                            </div>
                                            <button className="mt-6 w-full bg-slate-50 text-slate-900 py-3 rounded-xl text-[10px] font-black uppercase text-center hover:bg-slate-950 hover:text-white transition-all">Web Verze</button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-left">
                    <nav className="fixed top-0 w-full glass z-[100] border-b border-slate-200 px-8 h-24 flex justify-between items-center transition-all">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                            <div className="bg-slate-900 p-2.5 rounded-2xl text-white shadow-xl rotate-2 hover:rotate-0 transition-transform text-left"><Icon name="brick-wall" size={30}/></div>
                            <div className="flex flex-col leading-none text-left">
                                <span className="text-2xl font-black uppercase tracking-tighter italic text-slate-950">Architekti <span className="text-gradient">Dějin</span></span>
                                <span className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 mt-1 ml-0.5">Škola hrou</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                             <a href="#ekonomika" className="hidden lg:block text-[11px] font-black uppercase tracking-widest text-slate-400 hover:text-red-600 transition-colors">Udržitelnost</a>
                             <button onClick={() => setView('portal')} className="bg-slate-950 text-white px-8 py-3.5 rounded-full hover:bg-red-600 transition-all shadow-xl text-[11px] font-black uppercase">Portál</button>
                        </div>
                    </nav>

                    <header className="pt-64 pb-32 px-8 bg-white text-left">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-20 items-center">
                            <div className="flex-1 reveal text-left">
                                <div className="flex flex-wrap items-center gap-3 mb-10">
                                    <span className="bg-slate-100 text-slate-900 px-4 py-2 rounded-xl text-[10px] font-black uppercase italic border border-slate-200 text-left">Škola hrou</span>
                                    <span className="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg italic">V rámci RVP</span>
                                    <span className="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg italic font-bold">Šablony OP JAK</span>
                                </div>
                                <h1 className="text-6xl lg:text-9xl font-black tracking-tight leading-[0.85] mb-10 uppercase italic text-slate-950">Děti staví<br/><span className="text-gradient">Dějiny</span></h1>
                                <p className="text-2xl text-slate-500 italic border-l-[10px] border-red-600 pl-10 mb-12 max-w-2xl text-left">Mezipředmětové vazby v praxi. Dějepis, vlastivěda i <b>nová informatika</b> v jedné sadě LEGO® kostek.</p>
                                <div className="flex flex-wrap gap-6 text-left">
                                    <button onClick={() => setView('portal')} className="bg-slate-950 text-white px-12 py-7 rounded-[2.5rem] font-black uppercase text-sm tracking-[0.2em] shadow-2xl hover:bg-red-600 transition-all flex items-center gap-5 active:scale-95 group text-left">Vstoupit do výuky <Icon name="arrow-right" size={24}/></button>
                                    <div className="bg-white px-10 py-6 rounded-[2.5rem] border-2 border-slate-100 flex flex-col justify-center shadow-sm font-bold text-left">
                                        <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none text-left">Metodika v tištěné</p>
                                        <p className="text-lg font-black text-slate-950 italic uppercase leading-none text-left">i webové verzi</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <section id="ekonomika" className="py-24 px-8 bg-slate-900 text-white border-y border-white/5 text-left">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-3 gap-16 items-center">
                            <div className="lg:col-span-2 text-left text-left">
                                <h2 className="text-4xl font-black uppercase italic tracking-tighter mb-8 leading-none">Financování a výbava</h2>
                                <p className="text-xl text-slate-400 font-medium italic leading-relaxed mb-8 italic">Plně hrazeno ze <b>Šablon OP JAK</b>. Systém "otevři a uč" bez složitých příprav.</p>
                                <div className="grid sm:grid-cols-2 gap-10">
                                    <div className="bg-white/5 p-8 rounded-3xl border border-white/10 text-left">
                                        <p className="text-5xl font-black text-red-500 mb-2 italic">49 800 Kč</p>
                                        <p className="text-xs font-black uppercase text-slate-300 italic">Cena za kompletní třídní sadu</p>
                                        <p className="text-[10px] text-slate-400 mt-4 uppercase font-bold italic">Včetně tištěné i webové metodiky</p>
                                    </div>
                                    <div className="flex flex-col justify-center space-y-4 font-bold text-left">
                                        <div className="flex items-center gap-4"><Icon name="box" className="text-red-500" size={20}/><p className="text-sm italic">10x Třídní jednotka (650 LEGO® dílů na dvojici)</p></div>
                                        <div className="flex items-center gap-4"><Icon name="book" className="text-red-500" size={20}/><p className="text-sm italic font-black uppercase">Tištěná verze pro učitele</p></div>
                                        <div className="flex items-center gap-4"><Icon name="globe" className="text-blue-500" size={20}/><p className="text-sm italic font-black uppercase text-left">Webový portál s 3D blueprinty</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="rezervace" className="py-40 px-8 bg-white text-left text-left">
                        <div className="max-w-4xl mx-auto reveal text-left">
                            <h2 className="text-5xl md:text-7xl font-black uppercase italic tracking-tighter mb-10 text-slate-950 text-left text-left">Rezervujte si svůj box.</h2>
                            <div className="bg-slate-50 border-2 border-slate-900/10 p-10 rounded-[3rem] mb-12 flex flex-col md:flex-row items-center gap-8 text-left">
                                <div className="bg-slate-900 text-white p-6 rounded-2xl rotate-[-2deg] shadow-lg text-left text-left"><p className="text-sm font-black text-center">Bonus 2026</p><Icon name="award" size={40} className="mx-auto mt-2 text-red-500"/></div>
                                <div className="text-left text-slate-900 text-left text-left">
                                    <p className="text-2xl font-black uppercase italic text-slate-900 leading-tight">Nabídka pro prvních 20 škol:</p>
                                    <p className="text-4xl font-black uppercase mt-1 text-red-600">1x 650 LEGO® dílů NAVÍC!</p>
                                </div>
                            </div>
                            <p className="text-xl text-slate-500 italic mb-12 text-left">Učitelé se seznámí se systémem na <b>webináři</b>, otevřou knihu a děti staví s 650 LEGO® kostkami na každou dvojici. Vše v rámci Šablon.</p>
                            <a href={googleFormUrl} target="_blank" className="inline-flex items-center gap-6 bg-red-600 text-white px-16 py-8 rounded-[3rem] font-black uppercase text-sm tracking-[0.3em] shadow-2xl hover:bg-slate-950 transition-all active:scale-95 group btn-pulse text-left">Vyplnit dotazník rezervace <Icon name="external-link" size={24} /></a>
                        </div>
                    </section>

                    <footer className="bg-slate-950 text-white py-24 px-8 border-t-[10px] border-red-600 text-left">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-16 text-center md:text-left text-left">
                            <div className="text-left text-left text-left"><div className="flex items-center gap-4 mb-6 text-red-600 text-left"><Icon name="brick-wall" size={44}/><span className="text-4xl font-black uppercase italic text-white text-left text-left">Architekti dějin</span></div><p className="text-[11px] font-bold uppercase tracking-[0.5em] opacity-40 text-left">Nový Malín // Martin Vohralík // 2026</p></div>
                            <div className="text-right text-right"><p className="text-[11px] font-black uppercase mb-3 opacity-40">Kontakt</p><a href="mailto:vohralmartin@gmail.com" className="text-2xl font-black underline decoration-red-600 decoration-4 underline-offset-[12px] hover:text-red-500 transition-colors">vohralmartin@gmail.com</a></div>
                        </div>
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
