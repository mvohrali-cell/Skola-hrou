<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architekti dějin | Škola hrou</title>
    
    <!-- Externí knihovny -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; margin: 0; padding: 0; overflow-x: hidden; }
        .text-gradient { background: linear-gradient(to right, #ef4444, #b91c1c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; padding-right: 0.2em; }
        .glass { background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(20px); }
        .reveal { animation: reveal 0.8s ease-out forwards; opacity: 0; }
        @keyframes reveal { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .btn-pulse { animation: btn-pulse 2s infinite; }
        @keyframes btn-pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 selection:bg-red-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Komponenta pro ikony Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({ elements: [iconRef.current] });
                }
            }, [name]);
            return <span className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}><i ref={iconRef} data-lucide={name} style={{ width: size, height: size }}></i></span>;
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [grade, setGrade] = useState(4);
            const [currentImg, setCurrentImg] = useState(0);
            
            // ODKAZ NA FORMULÁŘ A OBRÁZKY
            const googleFormUrl = "https://forms.gle/RhHPDeaRrZQ1vspMA";
            const heroImages = ["image_8920a3.jpg", "foto2.jpg", "foto3.jpg"];

            useEffect(() => { window.scrollTo(0, 0); }, [view]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentImg(prev => (prev + 1) % heroImages.length), 5000);
                return () => clearInterval(timer);
            }, [heroImages.length]);

            const lessons4 = [
                { id: "4-01", name: "Stroj času", icon: "history", month: "Září" },
                { id: "4-02", name: "Lovci mamutů", icon: "tent", month: "Říjen" },
                { id: "4-03", name: "Keltské oppidum", icon: "shield", month: "Listopad" },
                { id: "4-04", name: "Příchod Slovanů", icon: "layers", month: "Prosinec" },
                { id: "4-05", name: "Velká Morava", icon: "landmark", month: "Leden" },
                { id: "4-06", name: "Raní Přemyslovci", icon: "tower-control", month: "Únor" },
                { id: "4-07", name: "Středověké město", icon: "layout-grid", month: "Březen" },
                { id: "4-08", name: "Gotika a Karel IV.", icon: "zap", month: "Duben" },
                { id: "4-09", name: "Chalupa Markétka", icon: "home", month: "Květen" },
                { id: "4-10", name: "Můj kraj", icon: "map", month: "Červen" }
            ];

            const lessons5 = [
                { id: "5-01", name: "Renesance", icon: "history", month: "Září" },
                { id: "5-02", name: "Baroko", icon: "sun", month: "Říjen" },
                { id: "5-03", name: "Klasicismus", icon: "columns-2", month: "Listopad" },
                { id: "5-04", name: "Průmyslová revoluce", icon: "factory", month: "Prosinec" },
                { id: "5-05", name: "Secese", icon: "flower-2", month: "Leden" },
                { id: "5-06", name: "První republika", icon: "flag", month: "Únor" },
                { id: "5-07", name: "Modernismus", icon: "building", month: "Březen" },
                { id: "5-08", name: "Panelové sídliště", icon: "box", month: "Duben" },
                { id: "5-09", name: "Ekologická stavba", icon: "sprout", month: "Květen" },
                { id: "5-10", name: "Budoucnost", icon: "rocket", month: "Červen" }
            ];

            const Nav = () => (
                <nav className={`fixed top-0 w-full z-[100] border-b px-8 h-24 flex justify-between items-center transition-all ${view === 'home' ? 'glass border-slate-200' : 'bg-slate-950 text-white border-red-600 border-b-4'}`}>
                    <div className="flex items-center gap-4 cursor-pointer" onClick={() => setView('home')}>
                        <div className="bg-slate-900 p-2.5 rounded-2xl text-white shadow-xl rotate-2 hover:rotate-0 transition-transform"><Icon name="brick-wall" size={30}/></div>
                        <div className="flex flex-col leading-none text-left">
                            <span className={`text-2xl font-black uppercase tracking-tighter italic ${view === 'home' ? 'text-slate-950' : 'text-white'}`}>Architekti <span className="text-gradient">Dějin</span></span>
                            <span className={`text-[10px] font-black uppercase tracking-[0.3em] mt-1 ml-0.5 ${view === 'home' ? 'text-slate-400' : 'text-slate-500'}`}>Škola hrou</span>
                        </div>
                    </div>
                    <div className="flex items-center gap-6">
                         {view === 'home' && <a href="#ekonomika" className="hidden lg:block text-[11px] font-black uppercase tracking-widest text-slate-400 hover:text-red-600 transition-colors">Udržitelnost</a>}
                         {view === 'home' && <a href="#rezervace" className="hidden md:flex items-center gap-3 bg-red-600 text-white px-7 py-3 rounded-full text-[11px] font-black uppercase tracking-widest shadow-xl hover:bg-slate-950 transition-all">Pilotní série</a>}
                         <button onClick={() => setView(view === 'home' ? 'portal' : 'home')} className={`${view === 'home' ? 'bg-slate-950 text-white' : 'bg-white text-slate-950'} px-8 py-3.5 rounded-full hover:bg-red-600 hover:text-white transition-all shadow-xl text-[11px] font-black uppercase flex items-center gap-3`}>
                            <Icon name={view === 'home' ? 'layout' : 'arrow-left'} size={18} className="text-red-500" /> {view === 'home' ? 'Portál' : 'Zpět na web'}
                         </button>
                    </div>
                </nav>
            );

            if (view === 'portal') {
                return (
                    <div className="min-h-screen bg-slate-50 text-left pt-24">
                        <Nav />
                        <div className="max-w-7xl mx-auto p-8 md:p-12 space-y-16">
                            <section className="reveal">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-8 flex items-center gap-3">
                                    <Icon name="file-text" size={16}/> Školní dokumentace
                                </h2>
                                <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between hover:shadow-2xl transition-all">
                                        <div><Icon name="award" className="text-red-600 mb-4" size={24} /><h3 className="font-black uppercase text-sm mb-2 text-slate-950">Edu-Box NM-650</h3><p className="text-[10px] text-slate-500 italic leading-tight">Technický list a obsah.</p></div>
                                        <a href="technicky_list.pdf" download className="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-xl text-[9px] font-black uppercase text-center hover:bg-red-600 transition-all shadow-md">Stáhnout PDF</a>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between hover:shadow-2xl transition-all">
                                        <div><Icon name="shield-check" className="text-blue-600 mb-4" size={24} /><h3 className="font-black uppercase text-sm mb-2 text-slate-950">Smlouva o dílo</h3><p className="text-[10px] text-slate-500 italic leading-tight">Vzor pro Šablony OP JAK.</p></div>
                                        <a href="smlouva_o_dílo.pdf" download="smlouva_o_dílo.pdf" className="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-xl text-[9px] font-black uppercase text-center hover:bg-blue-600 transition-all shadow-md">Stáhnout PDF</a>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between hover:shadow-2xl transition-all">
                                        <div><Icon name="presentation" className="text-green-600 mb-4" size={24} /><h3 className="font-black uppercase text-sm mb-2 text-slate-950">Prezentace</h3><p className="text-[10px] text-slate-500 italic">Kompletní vize projektu.</p></div>
                                        <a href="prezentace.pptx" download className="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-xl text-[9px] font-black uppercase text-center hover:bg-green-600 transition-all shadow-md">Stáhnout PPTX</a>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 flex flex-col justify-between hover:shadow-2xl transition-all ring-2 ring-red-500">
                                        <div><Icon name="file-edit" className="text-red-500 mb-4" size={24} /><h3 className="font-black uppercase text-sm mb-2 text-slate-950">Grantové podklady</h3><p className="text-[10px] text-slate-500 italic leading-tight">Texty do žádosti o Šablony.</p></div>
                                        <a href="podklady_pro_sablony.pdf" download className="mt-4 w-full bg-slate-950 text-white py-2.5 rounded-xl text-[9px] font-black uppercase text-center hover:bg-red-600 transition-all shadow-md">Text do grantu</a>
                                    </div>
                                </div>
                            </section>

                            <section className="reveal">
                                <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] flex items-center gap-3">
                                        <Icon name="book-open" size={16}/> Metodika (Digitální portál)
                                    </h2>
                                    <div className="bg-slate-200 p-1.5 rounded-2xl flex gap-2">
                                        <button onClick={() => setGrade(4)} className={`px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all ${grade === 4 ? 'bg-white shadow-md text-red-600' : 'text-slate-500 hover:text-slate-900'}`}>4. Třída</button>
                                        <button onClick={() => setGrade(5)} className={`px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all ${grade === 5 ? 'bg-white shadow-md text-blue-600' : 'text-slate-500 hover:text-slate-900'}`}>5. Třída</button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                                    {(grade === 4 ? lessons4 : lessons5).map(l => (
                                        <div key={l.id} className="bg-white p-6 rounded-[2rem] border border-slate-100 flex flex-col justify-between shadow-sm hover:shadow-xl transition-all">
                                            <div>
                                                <div className="flex justify-between mb-4">
                                                    <Icon name={l.icon} className={grade === 4 ? 'text-red-600' : 'text-blue-600'} size={24}/>
                                                    <span className="text-[10px] font-black uppercase opacity-40 text-slate-950">{l.month}</span>
                                                </div>
                                                <h3 className="text-sm font-black uppercase mb-1 leading-tight text-slate-950">{l.name}</h3>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase italic text-left">Materiál {l.id}</p>
                                            </div>
                                            <button className="mt-6 w-full bg-slate-50 text-slate-900 py-3 rounded-xl text-[10px] font-black uppercase text-center hover:bg-slate-950 hover:text-white transition-all">Web Verze</button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-left bg-[#F8FAFC]">
                    <Nav />
                    <header className="pt-64 pb-32 px-8 bg-white overflow-hidden relative">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-20 items-center">
                            <div className="flex-1 reveal">
                                <div className="flex flex-wrap items-center gap-3 mb-10 text-left text-left">
                                    <span className="bg-slate-100 text-slate-900 px-4 py-2 rounded-xl text-[10px] font-black uppercase italic border border-slate-200">Škola hrou</span>
                                    <span className="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg italic">V rámci RVP</span>
                                    <span className="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg italic font-bold">Šablony OP JAK</span>
                                </div>
                                <h1 className="text-6xl sm:text-7xl lg:text-9xl font-black tracking-tight leading-[0.85] mb-10 uppercase italic text-slate-950 text-left text-left">
                                    Děti staví<br/><span className="text-gradient">Dějiny</span>
                                </h1>
                                <p className="text-2xl text-slate-500 font-medium leading-relaxed mb-12 max-w-2xl italic border-l-[10px] border-red-600 pl-10 text-left text-left">
                                    Mezipředmětové vazby v praxi. Dějepis, vlastivěda, <b>matematika</b> i <b>nová informatika</b> v jedné sadě LEGO® kostek.
                                </p>
                                <div className="flex flex-wrap gap-6 text-left">
                                    <button onClick={() => setView('portal')} className="bg-slate-950 text-white px-12 py-7 rounded-[2.5rem] font-black uppercase text-sm tracking-[0.2em] shadow-2xl hover:bg-red-600 transition-all flex items-center gap-5 active:scale-95 group">
                                        Vstoupit do výuky <Icon name="arrow-right" size={24} className="group-hover:translate-x-3 transition-transform text-white" />
                                    </button>
                                    <div className="bg-white px-10 py-6 rounded-[2.5rem] border-2 border-slate-100 flex flex-col justify-center shadow-sm font-bold text-left">
                                        <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none text-left text-left">Metodika v tištěné</p>
                                        <p className="text-lg font-black text-slate-950 italic leading-none uppercase text-left text-left">i webové verzi</p>
                                    </div>
                                </div>
                            </div>
                            <div className="relative w-full lg:max-w-[480px] reveal" style={{animationDelay: '0.2s'}}>
                                <div className="bg-white p-3 rounded-[4.5rem] shadow-[0_60px_120px_rgba(0,0,0,0.12)] border border-slate-100 overflow-hidden aspect-[3/4] flex items-center justify-center transform lg:-rotate-1 hover:rotate-0 transition-all duration-700 relative">
                                    {heroImages.map((img, idx) => (
                                        <img key={img} src={img} alt={`Slide ${idx}`} className={`absolute inset-0 w-full h-full object-cover rounded-[4rem] transition-opacity duration-1000 ${idx === currentImg ? 'opacity-100' : 'opacity-0'}`} />
                                    ))}
                                    <div className="absolute inset-0 bg-gradient-to-t from-slate-950/40 via-transparent to-transparent pointer-events-none"></div>
                                </div>
                                <div className="absolute -bottom-10 -left-10 bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl z-20 max-w-[240px] border-8 border-white text-left text-left">
                                    <Icon name="brain" size={40} className="mb-4 text-red-500"/><p className="text-sm font-black uppercase tracking-widest leading-tight italic text-white text-left text-left">Okamžitě připraveno k používání</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <section id="ekonomika" className="py-24 px-8 bg-slate-900 text-white border-y border-white/5 text-left text-left">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-3 gap-16 items-center">
                            <div className="lg:col-span-2 text-white">
                                <h2 className="text-4xl font-black uppercase italic mb-8 leading-none">Financování a výbava</h2>
                                <p className="text-xl text-slate-400 font-medium italic leading-relaxed mb-8 italic text-left">Plně hrazeno ze <b>Šablon OP JAK</b>. Systém "otevři a uč" bez složitých příprav.</p>
                                <div className="grid sm:grid-cols-2 gap-10 text-left text-left">
                                    <div className="bg-white/5 p-8 rounded-3xl border border-white/10 text-left">
                                        <p className="text-5xl font-black text-red-500 mb-2 italic">49 500 Kč</p>
                                        <p className="text-xs font-black uppercase tracking-widest text-slate-300">Cena za kompletní třídní sadu</p>
                                        <p className="text-[10px] text-slate-400 mt-4 uppercase font-bold italic">Včetně tištěné i webové metodiky</p>
                                    </div>
                                    <div className="flex flex-col justify-center space-y-4 font-bold">
                                        <div className="flex items-center gap-4"><Icon name="box" className="text-red-500" size={20}/><p className="text-sm italic">10x Třídní jednotka (650 LEGO® dílů na dvojici)</p></div>
                                        <div className="flex items-center gap-4"><Icon name="book" className="text-red-500" size={20}/><p className="text-sm italic font-black uppercase">Fyzická i webová metodika</p></div>
                                        <div className="flex items-center gap-4"><Icon name="monitor" className="text-blue-500" size={20}/><p className="text-sm italic font-black uppercase">Úvodní webinář v ceně</p></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="rezervace" className="py-40 px-8 bg-white relative border-y border-slate-100 text-center text-left">
                        <div className="max-w-4xl mx-auto reveal text-left">
                            <h2 className="text-5xl md:text-7xl font-black uppercase italic mb-10 text-slate-950 leading-[0.9]">Rezervujte si svůj box.</h2>
                            <div className="bg-slate-50 border-2 border-slate-900/10 p-10 rounded-[3rem] mb-12 flex flex-col md:flex-row items-center gap-8 w-full text-left">
                                <div className="bg-slate-900 text-white p-6 rounded-2xl rotate-[-2deg] shadow-lg text-left text-left"><p className="text-sm font-black text-center text-left">Bonus 2026</p><Icon name="award" size={40} className="mx-auto mt-2 text-red-500"/></div>
                                <div className="text-left text-slate-900">
                                    <p className="text-2xl font-black uppercase italic tracking-wider leading-tight">Speciální nabídka pro prvních 20 škol:</p>
                                    <p className="text-4xl font-black uppercase mt-1 text-red-600">1x 650 LEGO® dílů NAVÍC</p>
                                    <p className="text-xs font-bold uppercase tracking-[0.1em] text-slate-400 mt-3 italic text-left">Dostanete 11. sadu dílů zdarma jako bonusovou jednotku pro učitele.</p>
                                </div>
                            </div>
                            <p className="text-xl text-slate-500 font-medium leading-relaxed mb-12 text-left italic">Učitelé se seznámí se systémem na <b>webináři</b>, otevřou knihu a děti staví s 650 LEGO® kostkami na každou dvojici.</p>
                            <a href={googleFormUrl} target="_blank" className="inline-flex items-center gap-6 bg-red-600 text-white px-16 py-8 rounded-[3rem] font-black uppercase text-sm tracking-[0.3em] shadow-2xl hover:bg-slate-950 transition-all active:scale-95 group btn-pulse">
                                Vyplnit dotazník rezervace <Icon name="external-link" size={24} className="text-white" />
                            </a>
                        </div>
                    </section>

                    <footer className="bg-slate-950 text-white py-24 px-8 border-t-[10px] border-red-600 text-left">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-16 text-center md:text-left text-left">
                            <div className="text-left text-left">
                                <div className="flex items-center gap-4 mb-6 text-red-600 text-left text-left"><Icon name="brick-wall" size={44}/><span className="text-4xl font-black uppercase italic text-white text-left text-left">Architekti dějin</span></div>
                                <p className="text-[11px] font-bold uppercase tracking-[0.5em] opacity-40 text-left text-left">Nový Malín // Martin Vohralík // 2026</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[11px] font-black uppercase mb-3 opacity-40 text-right text-right">Kontakt a podpora</p>
                                <a href="mailto:vohralmartin@gmail.com" className="text-2xl font-black underline decoration-red-600 decoration-4 underline-offset-[12px] hover:text-red-500 transition-colors text-right">vohralmartin@gmail.com</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
